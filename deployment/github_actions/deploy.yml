# PranaMap AI - Continuous Deployment Pipeline
name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Deploy target"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  # ---- Determine environment ----
  resolve-env:
    name: Resolve Environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}
    steps:
      - name: Set environment
        id: set-env
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "environment=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref_name }}" = "main" ]; then
            echo "environment=production" >> $GITHUB_OUTPUT
          else
            echo "environment=staging" >> $GITHUB_OUTPUT
          fi

  # ---- Deploy Backend to Render ----
  deploy-backend:
    name: Deploy Backend (${{ needs.resolve-env.outputs.environment }})
    runs-on: ubuntu-latest
    needs: resolve-env
    environment:
      name: ${{ needs.resolve-env.outputs.environment }}
      url: ${{ steps.deploy.outputs.render-url }}

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Render
        id: deploy
        run: |
          ENV="${{ needs.resolve-env.outputs.environment }}"
          echo "Deploying backend to $ENV..."

          # Trigger Render deploy via API
          if [ "$ENV" = "production" ]; then
            curl -X POST \
              "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys" \
              -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
              -H "Content-Type: application/json" \
              -d '{"clearCache": "false"}'

            echo "render-url=https://pranamap-api.onrender.com" >> $GITHUB_OUTPUT
          else
            echo "render-url=https://pranamap-api-staging.onrender.com" >> $GITHUB_OUTPUT
          fi

      - name: Wait for deployment
        run: |
          echo "Waiting for Render deployment to complete..."
          sleep 30

          # Health check
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "https://pranamap-api.onrender.com/api/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Backend is healthy!"
              exit 0
            fi
            echo "  Attempt $i: HTTP $STATUS - waiting 10s..."
            sleep 10
          done

          echo "Warning: Backend health check did not pass within timeout"

  # ---- Deploy Frontend to Vercel ----
  deploy-frontend:
    name: Deploy Frontend (${{ needs.resolve-env.outputs.environment }})
    runs-on: ubuntu-latest
    needs: resolve-env
    environment:
      name: ${{ needs.resolve-env.outputs.environment }}
      url: ${{ steps.deploy.outputs.vercel-url }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment
        run: cd frontend && vercel pull --yes --environment=${{ needs.resolve-env.outputs.environment }} --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build frontend
        run: cd frontend && vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        id: deploy
        run: |
          cd frontend
          if [ "${{ needs.resolve-env.outputs.environment }}" = "production" ]; then
            URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          else
            URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          fi
          echo "vercel-url=$URL" >> $GITHUB_OUTPUT
          echo "Deployed to: $URL"

  # ---- Post-deployment verification ----
  verify:
    name: Verify Deployment
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]

    steps:
      - name: Verify backend health
        run: |
          echo "Verifying backend deployment..."
          for i in $(seq 1 5); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "https://pranamap-api.onrender.com/api/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Backend: OK"
              exit 0
            fi
            sleep 5
          done
          echo "Backend health check failed"
          exit 1

      - name: Verify frontend
        run: |
          echo "Verifying frontend deployment..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://pranamap.in" || echo "000")
          if [ "$STATUS" = "200" ]; then
            echo "Frontend: OK"
          else
            echo "Frontend returned HTTP $STATUS"
          fi

      - name: Notify deployment
        if: always()
        run: |
          ENV="${{ needs.resolve-env.outputs.environment }}"
          echo "Deployment to $ENV completed."
          # Add Slack/Discord webhook notification here if needed:
          # curl -X POST "${{ secrets.SLACK_WEBHOOK }}" \
          #   -H 'Content-Type: application/json' \
          #   -d '{"text":"PranaMap AI deployed to $ENV"}'
