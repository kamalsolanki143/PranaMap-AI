# PranaMap AI - Continuous Integration Pipeline
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  # ---- Lint & Format ----
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python linting tools
        run: pip install ruff mypy

      - name: Ruff lint
        run: ruff check backend/ scripts/ tests/

      - name: Ruff format check
        run: ruff format --check backend/ scripts/ tests/

      - name: MyPy type check
        run: mypy backend/ --ignore-missing-imports --no-error-summary
        continue-on-error: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Frontend lint
        run: |
          if [ -f frontend/package.json ]; then
            cd frontend && npm ci && npm run lint
          fi

  # ---- Tests ----
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgis/postgis:15-3.4
        env:
          POSTGRES_DB: pranamap_test
          POSTGRES_USER: pranamap_test
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U pranamap_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov

      - name: Apply database schema
        env:
          DATABASE_URL: postgresql://pranamap_test:test_password@localhost:5432/pranamap_test
        run: psql $DATABASE_URL -f database/schema.sql

      - name: Run backend tests
        env:
          DATABASE_URL: postgresql://pranamap_test:test_password@localhost:5432/pranamap_test
          REDIS_URL: redis://localhost:6379/0
          ENVIRONMENT: test
        run: |
          python -m pytest tests/backend/ tests/ml/ -v \
            --tb=short \
            --cov=backend \
            --cov-report=xml \
            --junitxml=test-results.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-backend
          path: |
            test-results.xml
            coverage.xml

  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Run frontend tests
        run: cd frontend && npm test -- --coverage --ci

      - name: Upload test coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-frontend
          path: frontend/coverage/

  # ---- Build ----
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build frontend
        run: |
          if [ -f frontend/package.json ]; then
            cd frontend && npm ci && npm run build
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Verify Python imports
        run: python -c "import backend" || echo "Backend module check skipped"

      - name: Build Docker image (verify)
        run: |
          if [ -f deployment/docker/Dockerfile.frontend ]; then
            docker build -f deployment/docker/Dockerfile.frontend \
              --target builder \
              -t pranamap-frontend:ci .
          fi

  # ---- Security ----
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Run pip-audit
        run: |
          pip install pip-audit
          pip install -r requirements.txt 2>/dev/null || true
          pip-audit --ignore-vuln PYSEC-2024-* || true
